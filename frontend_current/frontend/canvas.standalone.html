.mode-tab.on{background:#111;border-color:#111;color:#fff}
.mode-tab:hover:not(.on){border-color:#bbb;color:#111}
.pill{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#555;transition:all .12s}
.pill.on{border-color:#111;background:#111;color:#fff}
.pill:hover:not(.on){border-color:#bbb}
.pill.off{opacity:.35;cursor:not-allowed;text-decoration:line-through}
.ta{width:100%;min-height:78px;max-height:280px;padding:10px 12px;font-size:13px;line-height:1.5;border:1.5px solid #eee;border-radius:10px;background:#fafafa;resize:vertical;outline:none;color:#222;transition:border-color .15s}
.ta:focus{border-color:#aaa;background:#fff}
.ta::placeholder{color:#bbb}
.camera-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
.cam-chip{height:28px;border-radius:8px;border:1.5px solid #e5e5e5;background:#fff;color:#555;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .12s}
.cam-chip:hover{border-color:#bbb;color:#111}
.cam-chip.on{background:#111;border-color:#111;color:#fff}
.imgslot{flex:1;height:70px;border-radius:10px;border:1.5px dashed #ddd;background:#f8f8f8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;position:relative;overflow:hidden}
.imgslot:hover{border-color:#aaa;background:#f0f0f0}
.imgslot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.add-asset{height:34px;padding:0 10px;border-radius:9px;border:1.5px dashed #d8d8d8;background:#fafafa;color:#777;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.add-asset:hover{border-color:#aaa;background:#f3f3f3;color:#111}
.asset-chip{width:62px;height:62px;border-radius:9px;position:relative;overflow:hidden;background:#f5f5f5;border:1px solid #e4e4e4;display:flex;align-items:center;justify-content:center;cursor:pointer}
.asset-chip:hover{border-color:#aaa}
.asset-chip img,.asset-chip video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.asset-chip span{position:absolute;left:0;right:0;bottom:0;padding:9px 3px 3px;background:linear-gradient(transparent,rgba(0,0,0,.62));color:#fff;font-size:9px;font-weight:600;text-align:center}
.asset-chip button{position:absolute;top:3px;right:3px;width:17px;height:17px;border-radius:9px;border:none;background:rgba(0,0,0,.55);color:#fff;font-size:12px;line-height:17px;cursor:pointer}
.audio-chip{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f6f6f6,#e8e8e8);color:#777}
.tgl{width:36px;height:20px;border-radius:10px;border:none;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl-k{position:absolute;top:2px;width:16px;height:16px;background:#fff;border-radius:8px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.btn-gen{width:100%;padding:11px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.btn-gen.ok{background:#111;color:#fff}
.btn-gen.ok:hover{opacity:.85}
.btn-gen.no{background:#e0e0e0;color:#aaa;cursor:not-allowed}

.empty{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:0}
.empty h3{font-size:17px;color:#c0c0c0;font-weight:400}
.empty p{font-size:12px;color:#d0d0d0;margin-top:5px}

@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect}=React;

// ── DotGrid: multi-density layered dots that scale with zoom ─────────────
function DotGrid({pan,zoom}){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const dpr=window.devicePixelRatio||1;
    const W=c.offsetWidth,H=c.offsetHeight;
    c.width=W*dpr;c.height=H*dpr;
    const ctx=c.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);

    // Uniform small dot grid. Subtle, never competes with content.
    const BASE=24;
    let step=BASE*zoom;
    while(step<10)step*=5;
    while(step>120)step/=5;
    let alpha=1;
    if(step<14)alpha=(step-10)/4;
    if(step>90)alpha=Math.max(0.3,(120-step)/30);
    alpha=Math.max(0,Math.min(1,alpha));

    const ox=((pan.x%step)+step)%step;
    const oy=((pan.y%step)+step)%step;
    ctx.fillStyle=`rgba(150,150,150,${0.4*alpha})`;
    const r=1;
    for(let x=ox-step;x<W+step;x+=step){
      for(let y=oy-step;y<H+step;y+=step){
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
      }
    }
  },[pan.x,pan.y,zoom]);

  // Track resize
  useEffect(()=>{
    function onR(){if(ref.current){ref.current.style.width=window.innerWidth+"px";ref.current.style.height=window.innerHeight+"px";}}
    onR();window.addEventListener("resize",onR);
    return()=>window.removeEventListener("resize",onR);
  },[]);

  return <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",background:"#e5e5e5"}}/>;
}

function Minimap({nodes,selId,pan,zoom,onPan}){
  const W=140,H=96,PAD=2;
  // World bounds: union of nodes + viewport, with margin
  const vpW=window.innerWidth/zoom, vpH=window.innerHeight/zoom;
  const vx=-pan.x/zoom, vy=-pan.y/zoom;
  let bx=vx,by=vy,bX=vx+vpW,bY=vy+vpH;
  for(const n of nodes){
    const[w,h]=window.frameSize(n.ar,n.resolution);
    if(n.x<bx)bx=n.x;if(n.y<by)by=n.y;
    if(n.x+w>bX)bX=n.x+w;if(n.y+h>bY)bY=n.y+h;
  }
  // Margin
  const M=50;bx-=M;by-=M;bX+=M;bY+=M;
  const bw=bX-bx,bh=bY-by;
  const s=Math.min((W-PAD*2)/bw,(H-PAD*2)/bh);
  const ox=PAD+(W-PAD*2-bw*s)/2,oy=PAD+(H-PAD*2-bh*s)/2;
  function w2m(x,y){return[ox+(x-bx)*s,oy+(y-by)*s];}
  function m2w(mx,my){return[(mx-ox)/s+bx,(my-oy)/s+by];}
  function onDown(e){
    const r=e.currentTarget.getBoundingClientRect();
    function go(ev){
      const mx=ev.clientX-r.left,my=ev.clientY-r.top;
      const[wx,wy]=m2w(mx,my);
      onPan({x:window.innerWidth/2-wx*zoom,y:window.innerHeight/2-wy*zoom});
    }
    go(e);
    function mv(ev){go(ev);}
    function up(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);}
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
  }
  const[vx0,vy0]=w2m(vx,vy);
  return(
    <div className="minimap" onMouseDown={onDown}>
      {nodes.map(n=>{
        const[w,h]=window.frameSize(n.ar,n.resolution);
        const[mx,my]=w2m(n.x,n.y);
        return<div key={n.id} className={"mm-node"+(n.id===selId?" sel":"")} style={{left:mx,top:my,width:Math.max(2,w*s),height:Math.max(2,h*s)}}/>;
      })}
      <div className="mm-vp" style={{left:vx0,top:vy0,width:vpW*s,height:vpH*s}}/>
    </div>
  );
}

function App(){
  const[zoom,setZoom]=useState(1);
  const[pan,setPan]=useState({x:0,y:0});
  const[nodes,setNodes]=useState([]);
  const[selId,setSelId]=useState(null);
  const[tool,setTool]=useState("cursor");
  const[spaceDown,setSpaceDown]=useState(false);
  const[panActive,setPanActive]=useState(false);
  const[panel,setPanel]=useState(null);
  const[preview,setPreview]=useState(null);
  const[backendConfig]=useState(()=>window.readBackendConfig());
  const panning=useRef(false);
  const createInFlight=useRef(false);
  const submitGuardRef=useRef({last:null});
  const panStart=useRef(null);
  const cvRef=useRef();
  const pollersRef=useRef({});
  const zoomRef=useRef(zoom);const panRef=useRef(pan);
  useEffect(()=>{zoomRef.current=zoom;},[zoom]);
  useEffect(()=>{panRef.current=pan;},[pan]);

  const selNode=nodes.find(n=>n.id===selId)||null;
  // Hand mode active if tool=hand OR space-held
  const handMode=tool==="hand"||spaceDown;

  // Smoothly animate zoom toward a screen point
  const animRef=useRef(null);
  function setZoomTo(nz,sx,sy,animate=true){
    const z0=zoomRef.current,p0=panRef.current;
    nz=Math.max(0.1,Math.min(4,nz));
    const wx=(sx-p0.x)/z0,wy=(sy-p0.y)/z0;
    const targetPan={x:sx-wx*nz,y:sy-wy*nz};
    if(!animate){setZoom(nz);setPan(targetPan);return;}
    if(animRef.current)cancelAnimationFrame(animRef.current);
    const start=performance.now();
    const dur=240;
    const pStart=p0,zStart=z0;
    const ease=t=>1-Math.pow(1-t,3);
    function tick(now){
      const t=Math.min(1,(now-start)/dur);const k=ease(t);
      setZoom(zStart+(nz-zStart)*k);
      setPan({x:pStart.x+(targetPan.x-pStart.x)*k,y:pStart.y+(targetPan.y-pStart.y)*k});
      if(t<1)animRef.current=requestAnimationFrame(tick);else animRef.current=null;
    }
    animRef.current=requestAnimationFrame(tick);
  }
  function zoomAt(factor,sx,sy,animate=false){
    setZoomTo(zoomRef.current*factor,sx,sy,animate);
  }

  function onCvMouseDown(e){
    const target=e.target;
    if(e.button===1||(e.button===0&&handMode)){
      e.preventDefault();
      panning.current=true;
      setPanActive(true);
      panStart.current={x:e.clientX-panRef.current.x,y:e.clientY-panRef.current.y};
      return;
    }
    if(e.button===0&&target===cvRef.current){
      setSelId(null);
      if(panel&&panel.type==="detail")setPanel(null);
    }
  }
  function onCvMouseMove(e){
    if(panning.current&&panStart.current){
      setPan({x:e.clientX-panStart.current.x,y:e.clientY-panStart.current.y});
    }
  }
  function onCvMouseUp(){if(panning.current){panning.current=false;setPanActive(false);}}

  function onWheel(e){
    e.preventDefault();
    // Ctrl/Cmd+wheel or trackpad pinch → zoom; plain wheel → pan
    if(e.ctrlKey||e.metaKey){
      const f=Math.exp(-e.deltaY*0.01);
      zoomAt(f,e.clientX,e.clientY,false);
    } else {
      setPan(p=>({x:p.x-e.deltaX,y:p.y-e.deltaY}));
    }
  }

  useEffect(()=>{
    const el=cvRef.current;
    if(el)el.addEventListener("wheel",onWheel,{passive:false});
    return()=>{if(el)el.removeEventListener("wheel",onWheel)};
  },[]);

  // Keyboard: Space=hand, Cmd/Ctrl +/- zoom, Cmd/Ctrl 0 reset, Esc deselect, Delete remove
  useEffect(()=>{
    function isTypable(el){
      if(!el)return false;
      const t=el.tagName;
      return t==="INPUT"||t==="TEXTAREA"||el.isContentEditable;
    }
    function onKD(e){
      if(isTypable(document.activeElement))return;
      if(e.code==="Space"&&!e.repeat){e.preventDefault();setSpaceDown(true);return;}
      if((e.metaKey||e.ctrlKey)&&(e.key==="="||e.key==="+")){
        e.preventDefault();
        const cx=window.innerWidth/2,cy=window.innerHeight/2;
        const next=Math.round((zoomRef.current+0.1)*10)/10;
        setZoomTo(next,cx,cy,true);return;
      }
      if((e.metaKey||e.ctrlKey)&&e.key==="-"){
        e.preventDefault();
        const cx=window.innerWidth/2,cy=window.innerHeight/2;
        const next=Math.round((zoomRef.current-0.1)*10)/10;
        setZoomTo(next,cx,cy,true);return;
      }
      if((e.metaKey||e.ctrlKey)&&e.key==="0"){
        e.preventDefault();
        const cx=window.innerWidth/2,cy=window.innerHeight/2;
        setZoomTo(1,cx,cy,true);return;
      }
      if(e.key==="Escape"){setSelId(null);setPanel(null);}
      if((e.key==="Delete"||e.key==="Backspace")&&selId){
        e.preventDefault();
        deleteNode(selId);
      }
    }
    function onKU(e){
      if(e.code==="Space"){setSpaceDown(false);panning.current=false;setPanActive(false);}
    }
    function onWinUp(){if(panning.current){panning.current=false;setPanActive(false);}}
    window.addEventListener("keydown",onKD);
    window.addEventListener("keyup",onKU);
    window.addEventListener("mouseup",onWinUp);
    window.addEventListener("blur",onWinUp);
    return()=>{window.removeEventListener("keydown",onKD);window.removeEventListener("keyup",onKU);window.removeEventListener("mouseup",onWinUp);window.removeEventListener("blur",onWinUp);};
  },[selId]);

  function stopPolling(id){
    pollersRef.current[id]?.stop?.();
    delete pollersRef.current[id];
  }
  function createAndPollTask(id,params){
    const controller=new AbortController();
    pollersRef.current[id]={stop:()=>controller.abort()};
    return window.requestCreateVideoTask(params,{signal:controller.signal,config:backendConfig}).then(task=>{
      if(controller.signal.aborted)return task;
      const taskId=task.taskId;
      setNodes(ns=>ns.map(n=>n.id===id?{...n,...window.nodePatchFromTask(task),taskId:taskId||n.taskId,task_id:taskId||n.task_id,backendMode:backendConfig.mode}:n));
      if(!taskId||window.TERMINAL_TASK_STATUSES.has(task.status)){stopPolling(id);return task;}
      const poller=window.startTaskPolling({
        taskId,
        config:backendConfig,
        signal:controller.signal,
        onUpdate:(next)=>setNodes(ns=>ns.map(n=>n.id===id?{...n,...window.nodePatchFromTask(next),taskId,task_id:taskId}:n)),
        onDone:()=>stopPolling(id)
      });
      pollersRef.current[id]={stop:()=>{poller.stop();controller.abort();}};
      return task;
    }).catch(err=>{
      const task=window.classifyTaskError(err);
      if(!task)return null;
      setNodes(ns=>ns.map(n=>n.id===id?{...n,...window.nodePatchFromTask({taskId:n.taskId,status:task.status,statusLabel:window.taskStatusLabel(task.status),errorMessage:task.errorMessage})}:n));
      stopPolling(id);
      throw err;
    });
  }
  function submitSignature(params){
    const pick={
      mode:params.mode,model:params.model,prompt:params.prompt,neg:params.neg||params.negPrompt,
      ar:params.ar||params.ratio,resolution:params.resolution,duration:params.duration,
      startImg:params.startImg||null,endImg:params.endImg||null,
      refImages:(params.refImages||[]).map(x=>x.url||x.name||x.kind),
      refVideos:(params.refVideos||[]).map(x=>x.url||x.name||x.kind),
      refAudios:(params.refAudios||[]).map(x=>x.url||x.name||x.kind),
      editVideo:(params.editVideo||[]).map(x=>x.url||x.name||x.kind),
      seed:params.seed||null,watermark:!!params.watermark,
      camera_fixed:!!(params.camera_fixed||params.fixedCam),
      generate_audio:!!(params.generate_audio||params.generateAudio),
      return_last_frame:!!(params.return_last_frame||params.returnLastFrame),
      web_search:!!params.webSearch
    };
    return JSON.stringify(pick);
  }
  function submitWarnings(params,signature){
    const warnings=[];
    if(params.resolution==="1080p")warnings.push("1080p 分辨率会显著增加生成成本。");
    if(Number(params.duration)>=10)warnings.push(`${params.duration}s 长视频会增加生成成本。`);
    if(params.generate_audio||params.generateAudio)warnings.push("生成音频会增加生成成本。");
    const mediaCount=(params.startImg?1:0)+(params.endImg?1:0)+(params.refImages?.length||0)+(params.refVideos?.length||0)+(params.refAudios?.length||0)+(params.editVideo?.length||0);
    if(mediaCount>1)warnings.push("多素材输入会增加生成成本和等待时间。");
    const last=submitGuardRef.current.last;
    if(last&&last.signature===signature&&Date.now()-last.at<5000)warnings.push("5 秒内提交了相同参数，可能会创建重复任务。");
    return warnings;
  }

  async function addNode(params){
    if(createInFlight.current)throw new Error("任务正在提交，请稍候");
    const validationErrors=window.validateCreateTaskParams(params,backendConfig);
    if(validationErrors.length){
      const err=new Error(validationErrors[0].message);
      err.field=validationErrors[0].field;
      throw err;
    }
    const signature=submitSignature(params);
    const warnings=submitWarnings(params,signature);
    if(warnings.length>0&&!window.confirm("请确认本次生成：\n\n"+warnings.join("\n")+"\n\n继续提交？")){
      return false;
    }
    createInFlight.current=true;
    try{
      const taskPatch={
        ...params,
        status:"generating",
        taskStatus:"queued",
        task_status:"queued",
        statusText:"提交任务中",
        progress:0,
        taskId:null,
        task_id:null,
        videoUrl:null,
        video_url:null,
        errorMessage:null,
        error_message:null,
        backendMode:backendConfig.mode,
        createdAt:Date.now()
      };
    if(panel?.nodeId){
      const existing=nodes.find(n=>n.id===panel.nodeId);
      if(existing){
        const id=existing.id;
        stopPolling(id);
        setNodes(ns=>ns.map(n=>n.id===id?{...n,...taskPatch}:n));
        setSelId(id);setPanel(null);
        return await createAndPollTask(id,params);
      }
    }
    submitGuardRef.current.last={signature,at:Date.now()};
    const id="n"+(Date.now());
    const[w,h]=window.frameSize(params.ar,params.resolution);
    let nx,ny;
    if(nodes.length===0){
      const cx=window.innerWidth/2,cy=window.innerHeight/2;
      nx=(cx-pan.x)/zoom-w/2;ny=(cy-pan.y)/zoom-h/2;
    } else {
      let maxR=-Infinity,refY=0;
      for(const n of nodes){
        const[nw]=window.frameSize(n.ar,n.resolution);
        const r=n.x+nw;
        if(r>maxR){maxR=r;refY=n.y;}
      }
      nx=maxR+100;ny=refY;
    }
    const newNode={id,x:nx,y:ny,...taskPatch};
    setNodes(ns=>[...ns,newNode]);
    setSelId(id);setPanel(null);
    return await createAndPollTask(id,params);
    }finally{
      createInFlight.current=false;
    }
  }

  function onClickNode(id,wasSelected){
    const n=nodes.find(x=>x.id===id);if(!n)return;
    if(!wasSelected){setSelId(id);setPanel(null);return;}
    if(n.status==="done"||n.taskId||n.status==="error"||n.status==="cancelled")setPanel({type:"detail",nodeId:id});
    else setPanel({type:"create",nodeId:id});
  }
  function onNodeAction(id,act){
    const n=nodes.find(x=>x.id===id);if(!n)return;
    if(act==="preview")setPreview(n);
    else if(act==="download")alert((n.video_url||n.videoUrl)?"请在预览中使用浏览器下载视频":"暂无可下载视频");
    else if(act==="info")setPanel({type:"detail",nodeId:id});
    else if(act==="cancel")void cancelNode(id);
    else if(act==="delete")deleteNode(id);
  }

  async function cancelNode(id){
    const n=nodes.find(x=>x.id===id);if(!n)return false;
    if(n.status!=="generating"){window.alert("只有生成中的任务可以取消。");return false;}
    if(!window.confirm("确认取消这个生成任务？"))return false;
    if(n.taskId){
      try{
        const task=await window.requestDeleteTask(n.taskId,{currentStatus:n.taskStatus||n.task_status||"running",config:backendConfig});
        stopPolling(id);
        setNodes(ns=>ns.map(x=>x.id===id?{...x,...window.nodePatchFromTask(task),taskId:n.taskId,task_id:n.taskId}:x));
      }catch(err){
        const message=err?.message||"取消任务失败，任务仍在继续轮询。";
        setNodes(ns=>ns.map(x=>x.id===id?{...x,errorMessage:message,error_message:message}:x));
        return false;
      }
    }else{
      stopPolling(id);
      setNodes(ns=>ns.map(x=>x.id===id?{...x,status:"cancelled",taskStatus:"cancelled",task_status:"cancelled",statusText:"已取消",progress:0,updatedAt:Date.now()}:x));
    }
    return true;
  }
  function deleteNode(id){
    const n=nodes.find(x=>x.id===id);if(!n)return false;
    if(n.status==="generating"){
      window.alert("任务仍在生成中。请先取消任务，取消成功后再删除记录。");
      return false;
    }
    if(!window.confirm("确认从画布删除这个任务记录？"))return false;
    stopPolling(id);
    setNodes(ns=>ns.filter(x=>x.id!==id));
    setSelId(null);setPanel(null);
    return true;
  }
  function moveNode(id,pos){setNodes(ns=>ns.map(n=>n.id===id?{...n,...pos}:n));}

  const tools=[
    {id:"cursor",tip:"选择",icon:<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-7 1.5-4 8z"/></svg>},
    {id:"hand",tip:"平移",icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M18 11V8a2 2 0 00-4 0v-1a2 2 0 00-4 0V6a2 2 0 00-4 0v8l-1.5-1.5a2 2 0 00-2.8 2.8L6 19a5 5 0 005 1h3a5 5 0 005-5v-4z"/></svg>},
    {id:"sep"},
    {id:"video",tip:"创建视频",icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M15 10l4.6-2.3A1 1 0 0121 8.7v6.6a1 1 0 01-1.4.9L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>},
    {id:"history",tip:"历史任务",icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 5 5.3"/><path d="M12 7v5l3 2"/></svg>},
  ];

  function onToolClick(id){
    if(id==="video"){setPanel({type:"create"});setTool("cursor");}
    else if(id==="history"){setPanel({type:"history"});setTool("cursor");}
    else setTool(id);
  }

  function nodePositionFor(ar="16:9",resolution="720p"){
    const[w,h]=window.frameSize(ar,resolution);
    const cx=window.innerWidth/2,cy=window.innerHeight/2;
    return {x:(cx-pan.x)/zoom-w/2,y:(cy-pan.y)/zoom-h/2};
  }
  function canvasNodeFromTask(task,overrides={}){
    const ar=task.ratio||"16:9";
    const resolution=task.resolution||"720p";
    const pos=nodePositionFor(ar,resolution);
    return {
      id:"n"+Date.now(),
      ...pos,
      mode:"t2v",
      model:task.model,
      modelLabel:task.modelLabel||"Seedance",
      ar,
      ratio:ar,
      resolution,
      duration:task.duration||5,
      prompt:task.prompt||"",
      createdAt:Date.now(),
      taskId:task.taskId,
      task_id:task.taskId,
      backendMode:backendConfig.mode,
      ...window.nodePatchFromTask(task),
      ...overrides
    };
  }

  const cursor=handMode?(panActive?"grabbing":"grab"):"default";
  useEffect(()=>{document.body.style.cursor=handMode?(panActive?"grabbing":"grab"):"";return()=>{document.body.style.cursor="";};},[handMode,panActive]);
  useEffect(()=>()=>{Object.keys(pollersRef.current).forEach(stopPolling);},[]);

  return(
    <div style={{width:"100vw",height:"100vh",position:"relative",overflow:"hidden",cursor}}>
      {/* Canvas BG — multi-layer dot grid scaling with zoom */}
      <DotGrid pan={pan} zoom={zoom}/>

      {/* Canvas interaction layer */}
      <div ref={cvRef} style={{position:"absolute",inset:0}} onMouseDown={onCvMouseDown} onMouseMove={onCvMouseMove} onMouseUp={onCvMouseUp}>
        {/* World layer (transforms with pan + zoom) */}
        <div style={{position:"absolute",top:0,left:0,transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`,transformOrigin:"0 0",pointerEvents:"none"}}>
          <div style={{pointerEvents:"auto"}}>
          {nodes.map(n=>(
            <VNode key={n.id} node={n} sel={selId===n.id} zoom={zoom}
              onClickNode={onClickNode}
              onMove={moveNode}
              onAction={(act)=>onNodeAction(n.id,act)}
            />
          ))}
          </div>
        </div>
      </div>

      {/* Top bar */}
      <div className="topbar">
        <div className="tb-left">
          <div style={{width:28,height:28,background:"#111",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <div className="tb-title">未命名画布 <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{opacity:.4}}><path d="M6 9l6 6 6-6"/></svg></div>
        </div>
        <div className="tb-right">
          <div className="btn-white" title={backendConfig.mode==="mock"?"当前使用本地 mock 后端，不会访问真实服务":window.createEndpoint?.(backendConfig)||""}>
            {backendConfig.mode==="mock"?"Mock 后端":backendConfig.mode==="dev"?"Dev 后端":"真实后端"}
          </div>
        </div>
      </div>

      {/* Bottom toolbar */}
      <div className="toolbar">
        {tools.map((t,i)=>t.id==="sep"
          ?<div key={i} className="t-sep"/>
          :<button key={t.id} className={"tool-btn"+(tool===t.id?" on":"")} onClick={()=>onToolClick(t.id)}>
            {t.icon}
            <span className="t-tip">{t.tip}</span>
          </button>
        )}
      </div>

      {/* Zoom bar */}
      <div className="zoom-bar">
        <button className="zb-btn" onClick={()=>{const cx=window.innerWidth/2,cy=window.innerHeight/2;setZoomTo(Math.round((zoomRef.current-0.1)*10)/10,cx,cy,true);}}>−</button>
        <div className="zb-val">{Math.round(zoom*100)}%</div>
        <button className="zb-btn" onClick={()=>{const cx=window.innerWidth/2,cy=window.innerHeight/2;setZoomTo(Math.round((zoomRef.current+0.1)*10)/10,cx,cy,true);}}>+</button>
      </div>

      {handMode&&<Minimap nodes={nodes} selId={selId} pan={pan} zoom={zoom} onPan={setPan}/>}

      <div className="fab-group">
        <button className={"fab"+(panel?.type==="agent"?" active":"")} title="对话" onClick={()=>setPanel(panel?.type==="agent"?null:{type:"agent"})}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8l-4 4z"/></svg>
        </button>
        <button className={"fab"+(panel?.type==="assets"?" active":"")} title="资产库" onClick={()=>setPanel(panel?.type==="assets"?null:{type:"assets"})}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
      </div>

      {/* Empty state */}
      {nodes.length===0&&(
        <div className="empty">
          <h3>画布是空的</h3>
          <p>点击工具栏的 <b>视频</b> 按钮开始创作</p>
        </div>
      )}

      {/* Panels */}
      {panel?.type==="create"&&(
        <CreatePanel
          node={nodes.find(n=>n.id===panel.nodeId)}
          onClose={()=>setPanel(null)}
          onGenerate={addNode}
          backendConfig={backendConfig}
        />
      )}
      {panel?.type==="detail"&&(()=>{const n=nodes.find(x=>x.id===panel.nodeId);return n&&(
        <DetailPanel
          node={n}
          onClose={()=>setPanel(null)}
          onPreview={()=>setPreview(n)}
          onDownload={()=>alert((n.video_url||n.videoUrl)?"请在预览中使用浏览器下载视频":"暂无可下载视频")}
          onCancel={()=>cancelNode(n.id)}
          onDelete={()=>deleteNode(n.id)}
          onRegen={()=>setPanel({type:"create",nodeId:n.id})}
        />
      );})()}
      {panel?.type==="agent"&&<AgentPanel onClose={()=>setPanel(null)} nodes={nodes}/>}
      {panel?.type==="assets"&&<AssetsPanel onClose={()=>setPanel(null)} nodes={nodes}/>}
      {panel?.type==="history"&&<HistoryPanel
        backendConfig={backendConfig}
        onClose={()=>setPanel(null)}
        onResumeTask={(task)=>{
          const node=canvasNodeFromTask(task,{status:"generating"});
          setNodes(ns=>[...ns,node]);
          setSelId(node.id);setPanel(null);
          const controller=new AbortController();
          pollersRef.current[node.id]={stop:()=>controller.abort()};
          const poller=window.startTaskPolling({
            taskId:task.taskId,
            config:backendConfig,
            signal:controller.signal,
            onUpdate:(next)=>setNodes(ns=>ns.map(n=>n.id===node.id?{...n,...window.nodePatchFromTask(next),taskId:task.taskId,task_id:task.taskId}:n)),
            onDone:()=>stopPolling(node.id)
          });
          pollersRef.current[node.id]={stop:()=>{poller.stop();controller.abort();}};
        }}
        onViewResult={(task)=>{
          const node=canvasNodeFromTask(task,{status:"done",progress:100});
          setNodes(ns=>[...ns,node]);
          setSelId(node.id);setPanel({type:"detail",nodeId:node.id});
        }}
        onCancelTask={(task)=>{
          setNodes(ns=>ns.map(n=>n.taskId===task.taskId?{...n,...window.nodePatchFromTask(task),taskId:task.taskId,task_id:task.taskId}:n));
        }}
        onDeleteTask={(task)=>{
          setNodes(ns=>{
            ns.forEach(n=>{if(n.taskId===task.taskId)stopPolling(n.id);});
            return ns.filter(n=>n.taskId!==task.taskId);
          });
        }}
      />}
      {preview&&<PreviewModal node={preview} onClose={()=>setPreview(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
