<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>画布 · 视频创作</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
// ── Frame sizing: depends on aspect ratio AND resolution ───────────────
const FRAME_AR = { "16:9": [16, 9], "9:16": [9, 16], "1:1": [1, 1], "4:3": [4, 3], "3:4": [3, 4], "21:9": [21, 9], adaptive: [16, 9] };
const STATUS_LABELS = { queued: "排队中", running: "生成中", succeeded: "已完成", failed: "生成失败", cancelled: "已取消", deleted: "已删除" };
const RES_SCALE = { "480p": 0.62, "720p": 0.82, "1080p": 1.0 };
const MAX_DIM = 240;
function frameSize(ar, res) {
  const [a, b] = FRAME_AR[ar] || [16, 9];
  const f = RES_SCALE[res] || 0.82;
  let w, h;
  if (a >= b) {w = MAX_DIM;h = MAX_DIM * b / a;} else
  {h = MAX_DIM;w = MAX_DIM * a / b;}
  return [Math.round(w * f), Math.round(h * f)];
}
window.frameSize = frameSize;
function aspectValue(ar) {
  const [a, b] = FRAME_AR[ar] || [16, 9];
  return `${a}/${b}`;
}

// ── VNode ────────────────────────────────────────────────────────────
function VNode({ node, sel, zoom, onClickNode, onMove, onAction }) {
  const [w, h] = frameSize(node.ar, node.resolution);
  const movedRef = React.useRef(false);

  function onMouseDown(e) {
    if (e.button !== 0) return;
    e.stopPropagation();
    movedRef.current = false;
    const sx = e.clientX,sy = e.clientY,ox = node.x,oy = node.y;
    function mv(ev) {
      const dx = ev.clientX - sx,dy = ev.clientY - sy;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) movedRef.current = true;
      if (movedRef.current) onMove(node.id, { x: ox + dx / zoom, y: oy + dy / zoom });
    }
    function up() {
      window.removeEventListener("mousemove", mv);
      window.removeEventListener("mouseup", up);
      if (!movedRef.current) onClickNode(node.id, sel);
    }
    window.addEventListener("mousemove", mv);
    window.addEventListener("mouseup", up);
  }

  const sc = { idle: "#ccc", generating: "#f59e0b", done: "#22c55e", error: "#ef4444" }[node.status] || "#ccc";
  const tbBtn = (icon, label, act, disabled) =>
  <button className="ntb-btn" title={label} disabled={disabled}
  onClick={(e) => {e.stopPropagation();if (!disabled) onAction(act);}}
  style={disabled ? { opacity: .35, cursor: "not-allowed" } : {}}>
      {icon}
    </button>;


  return (
    <div className={"vnode" + (sel ? " sel" : "")} style={{ left: node.x, top: node.y, width: w }}
    onMouseDown={onMouseDown}
    onDoubleClick={(e) => {e.stopPropagation();onClickNode(node.id, true);}}>
      {sel &&
      <div className="ntb" onMouseDown={(e) => e.stopPropagation()}>
          {tbBtn(<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z" /></svg>, "预览", "preview", node.status !== "done")}
          {tbBtn(<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>, "下载", "download", node.status !== "done")}
          {tbBtn(<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>, "信息", "info")}
          <div className="ntb-sep" />
          {tbBtn(<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6M14 11v6" /><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg>, "从画布删除", "delete")}
        </div>
      }
      <div className="vnode-card" style={{ width: w, height: h }}>
        {node.status === "generating" &&
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
            <div style={{ display: "flex", gap: 5 }}>
              {[0, 1, 2].map((i) =>
            <div key={i} style={{ width: 6, height: 6, borderRadius: 3, background: "rgba(0,0,0,0.3)", animation: `blink 1.2s ${i * 0.2}s ease-in-out infinite` }} />
            )}
            </div>
            {node.progress != null &&
          <div style={{ width: 80, height: 2, background: "#e0e0e0", borderRadius: 2 }}>
                <div style={{ width: node.progress + "%", height: "100%", background: "#555", borderRadius: 2, transition: "width .3s" }} />
              </div>
          }
            <span style={{ fontSize: 10, color: "rgba(0,0,0,0.4)" }}>生成中 {node.progress || 0}%</span>
          </div>
        }
        {node.status === "done" &&
        <div style={{ position: "absolute", inset: 0, background: "linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ width: Math.min(40, h * 0.3), height: Math.min(40, h * 0.3), borderRadius: "50%", background: "rgba(255,255,255,0.18)", backdropFilter: "blur(4px)", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width={Math.min(18, h * 0.14)} height={Math.min(18, h * 0.14)} viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z" /></svg>
            </div>
          </div>
        }
        {node.status === "error" && <span style={{ fontSize: 11, color: "#ef4444" }}>生成失败</span>}
        <div style={{ position: "absolute", top: 7, right: 7, width: 6, height: 6, borderRadius: 3, background: sc }} />
        {sel && <>
          <div className="sel-dot" style={{ top: -4, left: -4 }} />
          <div className="sel-dot" style={{ top: -4, right: -4 }} />
          <div className="sel-dot" style={{ bottom: -4, left: -4 }} />
          <div className="sel-dot" style={{ bottom: -4, right: -4 }} />
        </>}
      </div>
      <div className="vnode-lbl" style={{ maxWidth: w }}>{node.modelLabel} · {node.ar} · {node.resolution} · {node.duration}s</div>
    </div>);

}

// ── Models / constants ───────────────────────────────────────────────
const MODELS = [
{ id: "doubao-seedance-2-0-260128", label: "Seedance 2.0", maxResolution: "1080p", supportsReference: true },
{ id: "doubao-seedance-2-0-fast-260128", label: "Seedance 2.0 Fast", maxResolution: "720p", supportsReference: true }];

const MODE_OPTIONS = [
["t2v", "文生视频"],
["first_frame", "首帧"],
["first_last", "首尾帧"],
["reference", "参考生成"],
["edit", "编辑视频"],
["extend", "延长视频"]];
const MODE_LABELS = Object.fromEntries(MODE_OPTIONS);
const ARS = ["16:9", "9:16", "1:1", "4:3", "3:4", "21:9", "adaptive"];
const RESS = ["480p", "720p", "1080p"];

function Pill({ label, on, onClick, disabled }) {
  return <button onClick={disabled ? undefined : onClick} disabled={disabled} className={"pill" + (on ? " on" : "") + (disabled ? " off" : "")}>{label}</button>;
}
function Toggle({ on, onChange }) {
  return (
    <button onClick={() => onChange(!on)} className="tgl" style={{ background: on ? "#111" : "#ccc" }}>
      <div className="tgl-k" style={{ left: on ? 18 : 2 }} />
    </button>);

}

function MediaPicker({ label, accept, kind, items, onChange, max = 1 }) {
  const ref = React.useRef();
  const list = items || [];
  function add(files) {
    const next = [...list];
    for (const f of Array.from(files || [])) {
      if (next.length >= max) break;
      next.push({ url: URL.createObjectURL(f), name: f.name, kind });
    }
    onChange(next);
  }
  function remove(i) {
    onChange(list.filter((_, idx) => idx !== i));
  }
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
        <span style={{ fontSize: 11, color: "#888" }}>{label}</span>
        <span style={{ fontSize: 10, color: "#bbb", fontVariantNumeric: "tabular-nums" }}>{list.length}/{max}</span>
      </div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        {list.map((it, i) =>
        <div key={it.url + i} className="asset-chip">
          {kind === "image" && <img src={it.url} />}
          {kind === "video" && <video src={it.url} muted />}
          {kind === "audio" && <div className="audio-chip">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.5A4 4 0 1 1 10 10V5h10v3H12z" /></svg>
          </div>}
          <span>{kind === "image" ? "图片" : kind === "video" ? "视频" : "音频"}{i + 1}</span>
          <button onClick={(e) => {e.stopPropagation();remove(i);}}>×</button>
        </div>
        )}
        {list.length < max &&
        <button className="add-asset" onClick={() => ref.current?.click()}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14" /></svg>
          {label}
        </button>}
      </div>
      <input ref={ref} type="file" accept={accept} multiple={max > 1} style={{ display: "none" }}
      onChange={(e) => {add(e.target.files);e.target.value = "";}} />
    </div>
  );
}

function LocalImageStrip({ items = [], onPick, disabled }) {
  const images = items.slice(0, 6);
  if (images.length === 0) return null;
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ fontSize: 10.5, color: "#aaa", marginBottom: 6 }}>本地生图素材</div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        {images.map((it) =>
        <button key={it.id || it.url} disabled={disabled} onClick={() => !disabled && onPick(it)}
        title={it.provider_label || "本地临时 / Codex OAuth / 非 Ark 生成"}
        style={{ width: 48, height: 48, borderRadius: 8, border: "1px solid #e4e4e4", background: "#f7f7f7", overflow: "hidden", cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? .4 : 1, padding: 0 }}>
            <img src={it.url} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
          </button>
        )}
      </div>
    </div>
  );
}

function buildContent({ mode, prompt, startImg, endImg, refImages, refVideos, refAudios, editVideo }) {
  const content = [];
  if (prompt.trim()) content.push({ type: "text", text: prompt.trim() });
  if (mode === "first_frame" && startImg) content.push({ type: "image_url", image_url: { url: startImg }, role: "first_frame" });
  if (mode === "first_last") {
    if (startImg) content.push({ type: "image_url", image_url: { url: startImg }, role: "first_frame" });
    if (endImg) content.push({ type: "image_url", image_url: { url: endImg }, role: "last_frame" });
  }
  if (mode === "reference") {
    refImages.forEach((it) => content.push({ type: "image_url", image_url: { url: it.url }, role: "reference_image" }));
    refVideos.forEach((it) => content.push({ type: "video_url", video_url: { url: it.url }, role: "reference_video" }));
    refAudios.forEach((it) => content.push({ type: "audio_url", audio_url: { url: it.url }, role: "reference_audio" }));
  }
  if (mode === "edit") {
    editVideo.forEach((it) => content.push({ type: "video_url", video_url: { url: it.url }, role: "reference_video" }));
    refImages.forEach((it) => content.push({ type: "image_url", image_url: { url: it.url }, role: "reference_image" }));
    refAudios.forEach((it) => content.push({ type: "audio_url", audio_url: { url: it.url }, role: "reference_audio" }));
  }
  if (mode === "extend") {
    refVideos.forEach((it) => content.push({ type: "video_url", video_url: { url: it.url }, role: "reference_video" }));
  }
  return content;
}

const PANEL_POS_KEY = "sd2video:create-panel-position";
function defaultPanelPos() {
  return {
    x: typeof window === "undefined" ? 16 : Math.max(16, window.innerWidth - 326),
    y: 56
  };
}
function clampPanelPos(pos, w = 310, h = 520) {
  if (typeof window === "undefined") return pos;
  return {
    x: Math.max(8, Math.min(window.innerWidth - w - 8, pos.x)),
    y: Math.max(8, Math.min(window.innerHeight - h - 8, pos.y))
  };
}
function readPanelPos() {
  if (typeof window === "undefined") return defaultPanelPos();
  try {
    const saved = JSON.parse(window.localStorage.getItem(PANEL_POS_KEY) || "null");
    if (saved && Number.isFinite(saved.x) && Number.isFinite(saved.y)) return clampPanelPos(saved);
  } catch (_) {}
  return defaultPanelPos();
}
function savePanelPos(pos) {
  if (typeof window === "undefined") return;
  try { window.localStorage.setItem(PANEL_POS_KEY, JSON.stringify(pos)); } catch (_) {}
}

// ── CreatePanel ──────────────────────────────────────────────────────
function CreatePanel({ node, onClose, onGenerate, localImages = [] }) {
  const { useState: us, useRef: ur, useEffect: ue, useMemo: um } = React;
  const [mode, setMode] = us(node?.mode || "t2v");
  const [model, setModel] = us(node?.model || MODELS[0].id);
  const [prompt, setPrompt] = us(node?.prompt || "");
  const [neg, setNeg] = us(node?.neg || "");
  const [showNeg, setShowNeg] = us(false);
  const [ar, setAr] = us(node?.ar || "16:9");
  const [res, setRes] = us(node?.resolution || "720p");
  const [dur, setDur] = us(node?.duration || 5);
  const [startImg, setStart] = us(node?.startImg || null);
  const [endImg, setEnd] = us(node?.endImg || null);
  const [refImages, setRefImages] = us(node?.refImages || []);
  const [refVideos, setRefVideos] = us(node?.refVideos || (node?.refVideo ? [{ url: node.refVideo, kind: "video" }] : []));
  const [refAudios, setRefAudios] = us(node?.refAudios || []);
  const [editVideo, setEditVideo] = us(node?.editVideo || []);
  const [seed, setSeed] = us(node?.seed || "");
  const [watermark, setWM] = us(node?.watermark || false);
  const [fixedCam, setFixedCam] = us(node?.fixedCam || node?.camera_fixed || false);
  const [generateAudio, setGenerateAudio] = us(node?.generateAudio || node?.generate_audio || false);
  const [returnLastFrame, setReturnLastFrame] = us(node?.returnLastFrame || node?.return_last_frame || false);
  const [webSearch, setWebSearch] = us(!!node?.webSearch || !!node?.tools?.some((t) => t.type === "web_search"));
  const sRef = ur(),eRef = ur(),dragRef = ur(null);
  const [panelPos, setPanelPos] = us(readPanelPos);

  const selectedModel = MODELS.find((m) => m.id === model) || MODELS[0];
  const isFast = selectedModel.maxResolution === "720p";

  ue(() => {if (isFast && res === "1080p") setRes("720p");}, [isFast, res]);

  const content = um(() => buildContent({ mode, prompt, startImg, endImg, refImages, refVideos, refAudios, editVideo }),
  [mode, prompt, startImg, endImg, refImages, refVideos, refAudios, editVideo]);
  const hasPrompt = !!prompt.trim();
  const hasVisualRef = refImages.length > 0 || refVideos.length > 0;
  const ok =
    mode === "t2v" ? hasPrompt :
    mode === "first_frame" ? !!startImg :
    mode === "first_last" ? !!startImg && !!endImg :
    mode === "reference" ? hasPrompt && hasVisualRef :
    mode === "edit" ? hasPrompt && editVideo.length === 1 :
    mode === "extend" ? hasPrompt && refVideos.length > 0 :
    false;

  function go() {
    onGenerate({
      mode, model, prompt, neg, ar, ratio: ar, resolution: res, duration: dur,
      startImg, endImg, refImages, refVideos, refAudios, editVideo,
      seed: seed || null, watermark, fixedCam, camera_fixed: fixedCam,
      generateAudio, generate_audio: generateAudio,
      returnLastFrame, return_last_frame: returnLastFrame,
      webSearch, tools: webSearch ? [{ type: "web_search" }] : [],
      content,
      modelLabel: selectedModel.label
    });
  }

  function startDrag(e) {
    if (e.button !== 0 || e.target.closest("button")) return;
    e.preventDefault();
    const panel = dragRef.current;
    const w = panel?.offsetWidth || 310;
    const h = panel?.offsetHeight || 520;
    const sx = e.clientX,sy = e.clientY,ox = panelPos.x,oy = panelPos.y;
    function mv(ev) {
      const next = clampPanelPos({ x: ox + ev.clientX - sx, y: oy + ev.clientY - sy }, w, h);
      setPanelPos(next);
      savePanelPos(next);
    }
    function up() {
      window.removeEventListener("mousemove", mv);
      window.removeEventListener("mouseup", up);
    }
    window.addEventListener("mousemove", mv);
    window.addEventListener("mouseup", up);
  }

  return (
    <div ref={dragRef} className="panel" style={{ left: panelPos.x, top: panelPos.y, right: "auto" }}>
      <div className="ph ph-drag" onMouseDown={startDrag}>
        <div><div className="pt">生成视频</div><div className="ps">Seedance · 火山方舟</div></div>
        <button className="pc" onMouseDown={(e) => e.stopPropagation()} onClick={onClose}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12" /></svg>
        </button>
      </div>
      <div className="pb">
        {/* mode */}
        <div>
          <div className="fl">生成模式</div>
          <div className="mode-grid">
            {MODE_OPTIONS.map(([v, l]) =>
            <button key={v} onClick={() => setMode(v)} className={"mode-tab" + (mode === v ? " on" : "")}>{l}</button>
            )}
          </div>
        </div>

        {/* model */}
        <div>
          <div className="fl">模型</div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>{MODELS.map((m) => <Pill key={m.id} label={m.label} on={model === m.id} onClick={() => setModel(m.id)} />)}</div>
        </div>

        {/* reference material */}
        {(mode === "first_frame" || mode === "first_last") &&
        <div>
            <div className="fl">关键帧</div>
          <div style={{ display: "flex", gap: 8 }}>
              {[[startImg, setStart, sRef, "首帧"], ...(mode === "first_last" ? [[endImg, setEnd, eRef, "尾帧"]] : [])].map(([src, set, ref, lbl]) =>
            <div key={lbl} className="imgslot" onClick={() => ref.current?.click()}>
                    {src ? <img src={src} /> : <>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" strokeWidth="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" /></svg>
                      <span style={{ fontSize: 9, color: "#bbb", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em" }}>{lbl}</span>
                    </>}
                    <input ref={ref} type="file" accept="image/*" style={{ display: "none" }}
              onChange={(e) => {const f = e.target.files[0];if (f) set(URL.createObjectURL(f));}} />
                  </div>
            )}
              </div>
            <LocalImageStrip items={localImages} onPick={(asset) => {
              if (!startImg) setStart(asset.url); else if (mode === "first_last" && !endImg) setEnd(asset.url); else setStart(asset.url);
            }} />
          </div>
        }
        {mode === "reference" &&
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <div className="fl">参考素材</div>
          <MediaPicker label="参考图" accept="image/*" kind="image" items={refImages} onChange={setRefImages} max={9} />
          <LocalImageStrip items={localImages} disabled={refImages.length >= 9} onPick={(asset) => setRefImages((list) => [...list, { url: asset.url, name: asset.title, kind: "image", source: "local-codex-oauth" }].slice(0, 9))} />
          <MediaPicker label="参考视频" accept="video/*" kind="video" items={refVideos} onChange={setRefVideos} max={3} />
          <MediaPicker label="参考音频" accept="audio/*" kind="audio" items={refAudios} onChange={setRefAudios} max={3} />
        </div>}
        {mode === "edit" &&
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <div className="fl">编辑素材</div>
          <MediaPicker label="待编辑视频" accept="video/*" kind="video" items={editVideo} onChange={setEditVideo} max={1} />
          <MediaPicker label="参考图" accept="image/*" kind="image" items={refImages} onChange={setRefImages} max={9} />
          <LocalImageStrip items={localImages} disabled={refImages.length >= 9} onPick={(asset) => setRefImages((list) => [...list, { url: asset.url, name: asset.title, kind: "image", source: "local-codex-oauth" }].slice(0, 9))} />
          <MediaPicker label="参考音频" accept="audio/*" kind="audio" items={refAudios} onChange={setRefAudios} max={3} />
        </div>}
        {mode === "extend" &&
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <div className="fl">延长素材</div>
          <MediaPicker label="视频片段" accept="video/*" kind="video" items={refVideos} onChange={setRefVideos} max={3} />
        </div>}

        {/* prompt */}
        <div>
          <div className="fl">提示词</div>
          <textarea className="ta" value={prompt} onChange={(e) => setPrompt(e.target.value)} placeholder="描述你想生成的视频内容…" />
          <div onClick={() => setShowNeg((v) => !v)} style={{ fontSize: 11, color: "#bbb", cursor: "pointer", marginTop: 5, display: "flex", alignItems: "center", gap: 3 }}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d={showNeg ? "M18 15l-6-6-6 6" : "M6 9l6 6 6-6"} /></svg>
            {showNeg ? "收起" : "添加负向提示词"}
          </div>

function fmtTime(ts) {
  if (!ts) return "—";
  const d = new Date(ts);const p = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

const LOCAL_IMAGE_ENDPOINT = "http://127.0.0.1:8765";
const LOCAL_IMAGE_SIZES = ["1024x1024", "1536x1024", "1024x1536"];
const LOCAL_IMAGE_QUALITIES = ["low", "medium", "high"];
const LOCAL_IMAGE_QUALITY_LABELS = { low: "低", medium: "中", high: "高" };

function localImageBaseUrl() {
  return (window.SD2VIDEO_LOCAL_IMAGE_ENDPOINT || LOCAL_IMAGE_ENDPOINT).replace(/\/$/, "");
}

function resolveLocalAssetUrl(url) {
  if (!url) return "";
  if (/^https?:\/\//.test(url) || url.startsWith("blob:") || url.startsWith("data:")) return url;
  return localImageBaseUrl() + url;
}

function LocalImagePanel({ onClose, onGenerated }) {
  const { useState: us } = React;
  const [prompt, setPrompt] = us("");
  const [size, setSize] = us("1024x1024");
  const [quality, setQuality] = us("medium");
  const [background, setBackground] = us("opaque");
  const [loading, setLoading] = us(false);
  const [error, setError] = us("");
  const [asset, setAsset] = us(null);
  const ok = !!prompt.trim() && !loading;

  async function generate() {
    if (!ok) return;
    setLoading(true);
    setError("");
    try {
      const res = await fetch(localImageBaseUrl() + "/api/v1/local-images/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, size, quality, background, output_format: "png" }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.success) {
        throw new Error(data.error || "本地生图失败");
      }
      const next = { ...data.asset, url: resolveLocalAssetUrl(data.asset?.url), metadata: data.metadata };
      setAsset(next);
      onGenerated(next);
    } catch (e) {
      setError(e?.message || "本地生图失败，请检查本地 bridge");
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="panel">
      <div className="ph">
        <div><div className="pt">本地生图</div><div className="ps">本地临时 · Codex OAuth · 非 Ark 生成</div></div>
        <button className="pc" onClick={onClose}>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12" /></svg>
        </button>
      </div>
      <div className="pb">
        <div>
          <div className="fl">图片提示词</div>
          <textarea className="ta" value={prompt} onChange={(e) => setPrompt(e.target.value)} placeholder="描述要作为视频参考的图片…" />
        </div>
        <div>
          <div className="fl">尺寸</div>
          <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>{LOCAL_IMAGE_SIZES.map((s) => <Pill key={s} label={s} on={size === s} onClick={() => setSize(s)} />)}</div>
        </div>
        <div>
          <div className="fl">质量</div>
          <div style={{ display: "flex", gap: 5 }}>{LOCAL_IMAGE_QUALITIES.map((q) => <Pill key={q} label={LOCAL_IMAGE_QUALITY_LABELS[q]} on={quality === q} onClick={() => setQuality(q)} />)}</div>
        </div>
        <div>
          <div className="fl">背景</div>
          <div style={{ display: "flex", gap: 5 }}>
            <Pill label="不透明" on={background === "opaque"} onClick={() => setBackground("opaque")} />
            <Pill label="透明" on={background === "transparent"} onClick={() => setBackground("transparent")} />
          </div>
        </div>
        {asset && (
          <div>
            <div className="fl">预览</div>
            <div style={{ borderRadius: 10, overflow: "hidden", border: "1px solid #e6e6e6", background: "#f7f7f7", aspectRatio: size.replace("x", "/") }}>
              <img src={asset.url} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
            </div>
            <div style={{ fontSize: 11, color: "#888", lineHeight: 1.4, marginTop: 6 }}>已加入资产库，可作为后续首帧或参考图素材使用。</div>
          </div>
        )}
        {error && <div style={{ background: "#fef2f2", borderRadius: 8, padding: "8px 10px", fontSize: 12, color: "#b91c1c", lineHeight: 1.45 }}>{error}</div>}
      </div>
      <div className="panel-footer">
        <button onClick={generate} disabled={!ok} className={"btn-gen" + (ok ? " ok" : " no")}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" /></svg>
          {loading ? "生成中…" : asset ? "重新生成" : "生成图片"}
        </button>
      </div>
    </div>
  );
}

function fmtRelativeTime(ts) {
  if (!ts) return "—";
  const diff = Date.now() - new Date(ts).getTime();
  if (diff < 60000) return "刚刚";
  if (diff < 3600000) return Math.floor(diff / 60000) + " 分钟前";
  if (diff < 86400000) return Math.floor(diff / 3600000) + " 小时前";
  if (diff < 604800000) return Math.floor(diff / 86400000) + " 天前";
  return fmtTime(ts);
}

          <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="搜索任务 ID 或提示词…" style={{ flex: 1, border: "none", background: "none", outline: "none", fontSize: 13, color: "#222", fontFamily: "inherit" }} />
        </div>
      </div>

      {/* Status filter */}
      <div style={{ padding: "0 18px 10px", display: "flex", gap: 5, flexWrap: "wrap" }}>
        {HISTORY_STATUS_OPTIONS.map(([val, label]) => (
          <button key={val} onClick={() => setStatusFilter(val)} style={{
            padding: "4px 11px", borderRadius: 20, fontSize: 11.5, fontWeight: 600, cursor: "pointer",
            border: statusFilter === val ? "1.5px solid #111" : "1.5px solid #e5e5e5",
            background: statusFilter === val ? "#111" : "#fff",
            color: statusFilter === val ? "#fff" : "#777",
            transition: "all .12s",
          }}>{label}</button>
        ))}
      </div>

      {/* Task list */}
      <div style={{ flex: 1, overflowY: "auto", padding: "0 18px 14px", display: "flex", flexDirection: "column", gap: 10 }}>
        {loading && (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 40, gap: 10 }}>
            <div style={{ display: "flex", gap: 5 }}>
              {[0, 1, 2].map(i => <div key={i} style={{ width: 6, height: 6, borderRadius: 3, background: "#ccc", animation: `blink 1.2s ${i * 0.2}s ease-in-out infinite` }} />)}
            </div>
            <span style={{ fontSize: 12, color: "#999" }}>加载中…</span>
          </div>
        )}

        {error && !loading && (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 40, gap: 10 }}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span style={{ fontSize: 12.5, color: "#666" }}>{error}</span>
            <button onClick={() => { setError(null); setLoading(true); setTimeout(() => { setAllTasks(generateMockHistoryTasks(23)); setLoading(false); }, 500); }} style={{ padding: "6px 14px", borderRadius: 8, border: "1px solid #ddd", background: "#fff", fontSize: 12, cursor: "pointer", color: "#333" }}>重试</button>
          </div>
        )}

        {!loading && !error && filtered.length === 0 && (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 40, gap: 8 }}>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#d0d0d0" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
            <span style={{ fontSize: 13, color: "#bbb" }}>{searchQuery ? "没有匹配的任务" : "暂无历史任务"}</span>
          </div>
        )}

        {!loading && !error && paged.map(task => (
          <HistoryTaskCard
            key={task.task_id}
            task={task}
            onSelect={setDetailTask}
            onResume={onResumeTask}
            onViewResult={onViewResult}
          />
        ))}
      </div>

      {/* Pagination */}
      {!loading && !error && filtered.length > 0 && (
        <div style={{ padding: "10px 18px 14px", borderTop: "1px solid #f0f0f0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 11, color: "#999" }}>共 {filtered.length} 条</span>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <button disabled={page <= 1} onClick={() => setPage(p => p - 1)} style={{
              width: 28, height: 28, borderRadius: 7, border: "1px solid #e5e5e5", background: page <= 1 ? "#f9f9f9" : "#fff",
              cursor: page <= 1 ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center",
              color: page <= 1 ? "#ccc" : "#666", opacity: page <= 1 ? 0.5 : 1,
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span style={{ fontSize: 11.5, color: "#666", fontVariantNumeric: "tabular-nums", minWidth: 40, textAlign: "center" }}>{page} / {totalPages}</span>
            <button disabled={page >= totalPages} onClick={() => setPage(p => p + 1)} style={{
              width: 28, height: 28, borderRadius: 7, border: "1px solid #e5e5e5", background: page >= totalPages ? "#f9f9f9" : "#fff",
              cursor: page >= totalPages ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center",
              color: page >= totalPages ? "#ccc" : "#666", opacity: page >= totalPages ? 0.5 : 1,
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { VNode, CreatePanel, DetailPanel, PreviewModal, AgentPanel, AssetsPanel, LocalImagePanel, HistoryPanel, HistoryTaskCard, HISTORY_STATUS_OPTIONS, HISTORY_STATUS_COLORS, frameSize, FRAME_AR, localImageBaseUrl });

</script>

.audio-chip{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f6f6f6,#e8e8e8);color:#777}
.tgl{width:36px;height:20px;border-radius:10px;border:none;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl-k{position:absolute;top:2px;width:16px;height:16px;background:#fff;border-radius:8px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.btn-gen{width:100%;padding:11px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.btn-gen.ok{background:#111;color:#fff}
.btn-gen.ok:hover{opacity:.85}
.btn-gen.no{background:#e0e0e0;color:#aaa;cursor:not-allowed}

.empty{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:0}
.empty h3{font-size:17px;color:#c0c0c0;font-weight:400}
.empty p{font-size:12px;color:#d0d0d0;margin-top:5px}

@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect}=React;

// ── DotGrid: multi-density layered dots that scale with zoom ─────────────
function DotGrid({pan,zoom}){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const dpr=window.devicePixelRatio||1;
    const W=c.offsetWidth,H=c.offsetHeight;
    c.width=W*dpr;c.height=H*dpr;
    const ctx=c.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,W,H);

    // Uniform small dot grid. Subtle, never competes with content.
    const BASE=24;
    let step=BASE*zoom;
    while(step<10)step*=5;
    while(step>120)step/=5;
    let alpha=1;
    if(step<14)alpha=(step-10)/4;
    if(step>90)alpha=Math.max(0.3,(120-step)/30);
    alpha=Math.max(0,Math.min(1,alpha));

    const ox=((pan.x%step)+step)%step;
    const oy=((pan.y%step)+step)%step;
    ctx.fillStyle=`rgba(150,150,150,${0.4*alpha})`;
    const r=1;
    for(let x=ox-step;x<W+step;x+=step){
      for(let y=oy-step;y<H+step;y+=step){
        ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
      }
    }
  },[pan.x,pan.y,zoom]);

  // Track resize
  useEffect(()=>{
    function onR(){if(ref.current){ref.current.style.width=window.innerWidth+"px";ref.current.style.height=window.innerHeight+"px";}}
    onR();window.addEventListener("resize",onR);
    return()=>window.removeEventListener("resize",onR);
  },[]);

  return <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",background:"#e5e5e5"}}/>;
}

function Minimap({nodes,selId,pan,zoom,onPan}){
  const W=140,H=96,PAD=2;
  // World bounds: union of nodes + viewport, with margin
  const vpW=window.innerWidth/zoom, vpH=window.innerHeight/zoom;
  const vx=-pan.x/zoom, vy=-pan.y/zoom;
  let bx=vx,by=vy,bX=vx+vpW,bY=vy+vpH;
  for(const n of nodes){
    const[w,h]=window.frameSize(n.ar,n.resolution);
    if(n.x<bx)bx=n.x;if(n.y<by)by=n.y;
    if(n.x+w>bX)bX=n.x+w;if(n.y+h>bY)bY=n.y+h;
  }
  // Margin
  const M=50;bx-=M;by-=M;bX+=M;bY+=M;
  const bw=bX-bx,bh=bY-by;
  const s=Math.min((W-PAD*2)/bw,(H-PAD*2)/bh);
  const ox=PAD+(W-PAD*2-bw*s)/2,oy=PAD+(H-PAD*2-bh*s)/2;
  function w2m(x,y){return[ox+(x-bx)*s,oy+(y-by)*s];}
  function m2w(mx,my){return[(mx-ox)/s+bx,(my-oy)/s+by];}
  function onDown(e){
    const r=e.currentTarget.getBoundingClientRect();
    function go(ev){
      const mx=ev.clientX-r.left,my=ev.clientY-r.top;
      const[wx,wy]=m2w(mx,my);
      onPan({x:window.innerWidth/2-wx*zoom,y:window.innerHeight/2-wy*zoom});
    }
    go(e);
    function mv(ev){go(ev);}
    function up(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);}
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
  }
  const[vx0,vy0]=w2m(vx,vy);
  return(
    <div className="minimap" onMouseDown={onDown}>
      {nodes.map(n=>{
        const[w,h]=window.frameSize(n.ar,n.resolution);
        const[mx,my]=w2m(n.x,n.y);
        return<div key={n.id} className={"mm-node"+(n.id===selId?" sel":"")} style={{left:mx,top:my,width:Math.max(2,w*s),height:Math.max(2,h*s)}}/>;
      })}
      <div className="mm-vp" style={{left:vx0,top:vy0,width:vpW*s,height:vpH*s}}/>
    </div>
  );
}

function App(){
  const[zoom,setZoom]=useState(1);
  const[pan,setPan]=useState({x:0,y:0});
  const[nodes,setNodes]=useState([]);
  const[selId,setSelId]=useState(null);
  const[tool,setTool]=useState("cursor");
  const[spaceDown,setSpaceDown]=useState(false);
  const[panActive,setPanActive]=useState(false);
  const[panel,setPanel]=useState(null);
  const[preview,setPreview]=useState(null);
  const[localImageEnabled,setLocalImageEnabled]=useState(false);
  const[localImages,setLocalImages]=useState([]);
  const panning=useRef(false);
  const panStart=useRef(null);
  const cvRef=useRef();
  const zoomRef=useRef(zoom);const panRef=useRef(pan);
  useEffect(()=>{zoomRef.current=zoom;},[zoom]);
  useEffect(()=>{panRef.current=pan;},[pan]);

  const selNode=nodes.find(n=>n.id===selId)||null;
  // Hand mode active if tool=hand OR space-held
  const handMode=tool==="hand"||spaceDown;

  useEffect(()=>{
    let cancelled=false;
    fetch(window.localImageBaseUrl()+"/api/v1/local-images/status")
      .then(r=>r.ok?r.json():null)
      .then(data=>{if(!cancelled)setLocalImageEnabled(!!data?.enabled);})
      .catch(()=>{if(!cancelled)setLocalImageEnabled(false);});
    return()=>{cancelled=true;};
  },[]);

  // Smoothly animate zoom toward a screen point
  const animRef=useRef(null);
  function setZoomTo(nz,sx,sy,animate=true){
    const z0=zoomRef.current,p0=panRef.current;
    nz=Math.max(0.1,Math.min(4,nz));
    const wx=(sx-p0.x)/z0,wy=(sy-p0.y)/z0;
    const targetPan={x:sx-wx*nz,y:sy-wy*nz};
    if(!animate){setZoom(nz);setPan(targetPan);return;}
    if(animRef.current)cancelAnimationFrame(animRef.current);
    const start=performance.now();
    const dur=240;
    const pStart=p0,zStart=z0;
    const ease=t=>1-Math.pow(1-t,3);
    function tick(now){
      const t=Math.min(1,(now-start)/dur);const k=ease(t);
      setZoom(zStart+(nz-zStart)*k);
      setPan({x:pStart.x+(targetPan.x-pStart.x)*k,y:pStart.y+(targetPan.y-pStart.y)*k});
      if(t<1)animRef.current=requestAnimationFrame(tick);else animRef.current=null;
    }
    animRef.current=requestAnimationFrame(tick);
  }
  function zoomAt(factor,sx,sy,animate=false){
    setZoomTo(zoomRef.current*factor,sx,sy,animate);
  }

  function onCvMouseDown(e){
    const target=e.target;
    if(e.button===1||(e.button===0&&handMode)){
      e.preventDefault();
      panning.current=true;
      setPanActive(true);
      panStart.current={x:e.clientX-panRef.current.x,y:e.clientY-panRef.current.y};
      return;
    }
    if(e.button===0&&target===cvRef.current){
      setSelId(null);
      if(panel&&panel.type==="detail")setPanel(null);
    }
  }
  function onCvMouseMove(e){
    if(panning.current&&panStart.current){
      setPan({x:e.clientX-panStart.current.x,y:e.clientY-panStart.current.y});
    }
  }
  function onCvMouseUp(){if(panning.current){panning.current=false;setPanActive(false);}}

  function onWheel(e){
    e.preventDefault();
    // Ctrl/Cmd+wheel or trackpad pinch → zoom; plain wheel → pan
    if(e.ctrlKey||e.metaKey){
      const f=Math.exp(-e.deltaY*0.01);
      zoomAt(f,e.clientX,e.clientY,false);
    } else {
      setPan(p=>({x:p.x-e.deltaX,y:p.y-e.deltaY}));
    }
  }

  useEffect(()=>{
    const el=cvRef.current;
    if(el)el.addEventListener("wheel",onWheel,{passive:false});
    return()=>{if(el)el.removeEventListener("wheel",onWheel)};
  },[]);

  // Keyboard: Space=hand, Cmd/Ctrl +/- zoom, Cmd/Ctrl 0 reset, Esc deselect, Delete remove
  useEffect(()=>{
    function isTypable(el){
      if(!el)return false;
      const t=el.tagName;
      return t==="INPUT"||t==="TEXTAREA"||el.isContentEditable;
    }
    function onKD(e){
      if(isTypable(document.activeElement))return;
      if(e.code==="Space"&&!e.repeat){e.preventDefault();setSpaceDown(true);return;}
      if((e.metaKey||e.ctrlKey)&&(e.key==="="||e.key==="+")){
        e.preventDefault();
        const cx=window.innerWidth/2,cy=window.innerHeight/2;
        const next=Math.round((zoomRef.current+0.1)*10)/10;
        setZoomTo(next,cx,cy,true);return;
      }
      if((e.metaKey||e.ctrlKey)&&e.key==="-"){
        e.preventDefault();
        const cx=window.innerWidth/2,cy=window.innerHeight/2;
        const next=Math.round((zoomRef.current-0.1)*10)/10;
        setZoomTo(next,cx,cy,true);return;
      }
      if((e.metaKey||e.ctrlKey)&&e.key==="0"){
        e.preventDefault();
        const cx=window.innerWidth/2,cy=window.innerHeight/2;
        setZoomTo(1,cx,cy,true);return;
      }
      if(e.key==="Escape"){setSelId(null);setPanel(null);}
      if((e.key==="Delete"||e.key==="Backspace")&&selId){
        e.preventDefault();
        setNodes(ns=>ns.filter(n=>n.id!==selId));
        setSelId(null);setPanel(null);
      }
    }
    function onKU(e){
      if(e.code==="Space"){setSpaceDown(false);panning.current=false;setPanActive(false);}
    }
    function onWinUp(){if(panning.current){panning.current=false;setPanActive(false);}}
    window.addEventListener("keydown",onKD);
    window.addEventListener("keyup",onKU);
    window.addEventListener("mouseup",onWinUp);
    window.addEventListener("blur",onWinUp);
    return()=>{window.removeEventListener("keydown",onKD);window.removeEventListener("keyup",onKU);window.removeEventListener("mouseup",onWinUp);window.removeEventListener("blur",onWinUp);};
  },[selId]);

  function addNode(params){
    if(panel?.nodeId){
      const existing=nodes.find(n=>n.id===panel.nodeId);
      if(existing){
        const id=existing.id;
        setNodes(ns=>ns.map(n=>n.id===id?{...n,...params,status:"generating",progress:0,createdAt:Date.now()}:n));
        setSelId(id);setPanel(null);
        simulateGen(id);return;
      }
    }
    const id="n"+(Date.now());
    const[w,h]=window.frameSize(params.ar,params.resolution);
    let nx,ny;
    if(nodes.length===0){
      const cx=window.innerWidth/2,cy=window.innerHeight/2;
      nx=(cx-pan.x)/zoom-w/2;ny=(cy-pan.y)/zoom-h/2;
    } else {
      let maxR=-Infinity,refY=0;
      for(const n of nodes){
        const[nw]=window.frameSize(n.ar,n.resolution);
        const r=n.x+nw;
        if(r>maxR){maxR=r;refY=n.y;}
      }
      nx=maxR+100;ny=refY;
    }
    const newNode={id,x:nx,y:ny,status:"generating",progress:0,createdAt:Date.now(),...params};
    setNodes(ns=>[...ns,newNode]);
    setSelId(id);setPanel(null);
    simulateGen(id);
  }
  function simulateGen(id){
    let p=0;
    const t=setInterval(()=>{
      p+=Math.random()*15+5;
      if(p>=100){clearInterval(t);setNodes(ns=>ns.map(n=>n.id===id?{...n,status:"done",progress:100}:n));}
      else setNodes(ns=>ns.map(n=>n.id===id?{...n,progress:Math.round(p)}:n));
    },400);
  }

  function onClickNode(id,wasSelected){
    const n=nodes.find(x=>x.id===id);if(!n)return;
    if(!wasSelected){setSelId(id);setPanel(null);return;}
    if(n.status==="done")setPanel({type:"detail",nodeId:id});
    else setPanel({type:"create",nodeId:id});
  }
  function onNodeAction(id,act){
    const n=nodes.find(x=>x.id===id);if(!n)return;
    if(act==="preview")setPreview(n);
    else if(act==="download")alert("下载 "+(n.title||"video")+".mp4 (mock)");
    else if(act==="info")setPanel({type:"detail",nodeId:id});
    else if(act==="delete")deleteNode(id);
  }

  function deleteNode(id){setNodes(ns=>ns.filter(n=>n.id!==id));setSelId(null);setPanel(null);}
  function moveNode(id,pos){setNodes(ns=>ns.map(n=>n.id===id?{...n,...pos}:n));}

  const tools=[
    {id:"cursor",tip:"选择",icon:<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-7 1.5-4 8z"/></svg>},
    {id:"hand",tip:"平移",icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M18 11V8a2 2 0 00-4 0v-1a2 2 0 00-4 0V6a2 2 0 00-4 0v8l-1.5-1.5a2 2 0 00-2.8 2.8L6 19a5 5 0 005 1h3a5 5 0 005-5v-4z"/></svg>},
    {id:"sep"},
    {id:"video",tip:"创建视频",icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M15 10l4.6-2.3A1 1 0 0121 8.7v6.6a1 1 0 01-1.4.9L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>},
    ...(localImageEnabled?[{id:"local-image",tip:"本地生图",icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8" cy="10" r="1.6"/><path d="M21 15l-4.5-4.5L9 18"/></svg>}]:[]),
    {id:"history",tip:"历史任务",icon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>},
  ];

  function onToolClick(id){
    if(id==="video"){setPanel({type:"create"});setTool("cursor");}
    else if(id==="local-image"){setPanel({type:"local-image"});setTool("cursor");}
    else if(id==="history"){setPanel(panel?.type==="history"?null:{type:"history"});}
    else setTool(id);
  }

  const cursor=handMode?(panActive?"grabbing":"grab"):"default";
  useEffect(()=>{document.body.style.cursor=handMode?(panActive?"grabbing":"grab"):"";return()=>{document.body.style.cursor="";};},[handMode,panActive]);

  return(
    <div style={{width:"100vw",height:"100vh",position:"relative",overflow:"hidden",cursor}}>
      {/* Canvas BG — multi-layer dot grid scaling with zoom */}
      <DotGrid pan={pan} zoom={zoom}/>

      {/* Canvas interaction layer */}
      <div ref={cvRef} style={{position:"absolute",inset:0}} onMouseDown={onCvMouseDown} onMouseMove={onCvMouseMove} onMouseUp={onCvMouseUp}>
        {/* World layer (transforms with pan + zoom) */}
        <div style={{position:"absolute",top:0,left:0,transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`,transformOrigin:"0 0",pointerEvents:"none"}}>
          <div style={{pointerEvents:"auto"}}>
          {nodes.map(n=>(
            <VNode key={n.id} node={n} sel={selId===n.id} zoom={zoom}
              onClickNode={onClickNode}
              onMove={moveNode}
              onAction={(act)=>onNodeAction(n.id,act)}
            />
          ))}
          </div>
        </div>
      </div>

      {/* Top bar */}
      <div className="topbar">
        <div className="tb-left">
          <div style={{width:28,height:28,background:"#111",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <div className="tb-title">未命名画布 <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{opacity:.4}}><path d="M6 9l6 6 6-6"/></svg></div>
        </div>
        <div className="tb-right"></div>
      </div>

      {/* Bottom toolbar */}
      <div className="toolbar">
        {tools.map((t,i)=>t.id==="sep"
          ?<div key={i} className="t-sep"/>
          :<button key={t.id} className={"tool-btn"+(tool===t.id?" on":"")} onClick={()=>onToolClick(t.id)}>
            {t.icon}
            <span className="t-tip">{t.tip}</span>
          </button>
        )}
      </div>

      {/* Zoom bar */}
      <div className="zoom-bar">
        <button className="zb-btn" onClick={()=>{const cx=window.innerWidth/2,cy=window.innerHeight/2;setZoomTo(Math.round((zoomRef.current-0.1)*10)/10,cx,cy,true);}}>−</button>
        <div className="zb-val">{Math.round(zoom*100)}%</div>
        <button className="zb-btn" onClick={()=>{const cx=window.innerWidth/2,cy=window.innerHeight/2;setZoomTo(Math.round((zoomRef.current+0.1)*10)/10,cx,cy,true);}}>+</button>
      </div>

      {handMode&&<Minimap nodes={nodes} selId={selId} pan={pan} zoom={zoom} onPan={setPan}/>}

      <div className="fab-group">
        <button className={"fab"+(panel?.type==="agent"?" active":"")} title="对话" onClick={()=>setPanel(panel?.type==="agent"?null:{type:"agent"})}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8l-4 4z"/></svg>
        </button>
        <button className={"fab"+(panel?.type==="history"?" active":"")} title="历史任务" onClick={()=>setPanel(panel?.type==="history"?null:{type:"history"})}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
        <button className={"fab"+(panel?.type==="assets"?" active":"")} title="资产库" onClick={()=>setPanel(panel?.type==="assets"?null:{type:"assets"})}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
      </div>

      {/* Empty state */}
      {nodes.length===0&&(
        <div className="empty">
          <h3>画布是空的</h3>
          <p>点击工具栏的 <b>视频</b> 按钮开始创作</p>
        </div>
      )}

      {/* Panels */}
      {panel?.type==="create"&&(
        <CreatePanel
          node={nodes.find(n=>n.id===panel.nodeId)}
          onClose={()=>setPanel(null)}
          onGenerate={addNode}
          localImages={localImages}
        />
      )}
      {panel?.type==="detail"&&(()=>{const n=nodes.find(x=>x.id===panel.nodeId);return n&&(
        <DetailPanel
          node={n}
          onClose={()=>setPanel(null)}
          onPreview={()=>setPreview(n)}
          onDownload={()=>alert("下载 "+(n.title||"video")+".mp4 (mock)")}
          onDelete={()=>deleteNode(n.id)}
          onRegen={()=>setPanel({type:"create",nodeId:n.id})}
        />
      );})()}
      {panel?.type==="agent"&&<AgentPanel onClose={()=>setPanel(null)} nodes={nodes}/>}
      {panel?.type==="assets"&&<AssetsPanel onClose={()=>setPanel(null)} nodes={nodes} localImages={localImages}/>}
      {panel?.type==="local-image"&&<LocalImagePanel
        onClose={()=>setPanel(null)}
        onGenerated={(asset)=>setLocalImages(items=>[asset,...items.filter(it=>it.id!==asset.id)])}
      />}
      {panel?.type==="history"&&<HistoryPanel
        onClose={()=>setPanel(null)}
        onResumeTask={(task)=>{
          // Resume polling: create a canvas node from the history task and start polling
          const id="n"+Date.now();
          const[w,h]=window.frameSize(task.ratio||"16:9",task.resolution||"720p");
          const cx=window.innerWidth/2,cy=window.innerHeight/2;
          const nx=(cx-pan.x)/zoom-w/2,ny=(cy-pan.y)/zoom-h/2;
          const newNode={
            id,x:nx,y:ny,status:"generating",progress:0,
            createdAt:Date.now(),taskId:task.task_id,
            mode:"t2v",model:task.model,modelLabel:task.modelLabel||"Seedance",
            ar:task.ratio||"16:9",ratio:task.ratio||"16:9",
            resolution:task.resolution||"720p",duration:task.duration||5,
            prompt:task.prompt||"",
          };
          setNodes(ns=>[...ns,newNode]);
          setSelId(id);setPanel(null);
          simulateGen(id);
        }}
        onViewResult={(task)=>{
          // Create a done node and open preview
          const id="n"+Date.now();
          const[w,h]=window.frameSize(task.ratio||"16:9",task.resolution||"720p");
          const cx=window.innerWidth/2,cy=window.innerHeight/2;
          const nx=(cx-pan.x)/zoom-w/2,ny=(cy-pan.y)/zoom-h/2;
          const newNode={
            id,x:nx,y:ny,status:"done",progress:100,
            createdAt:Date.now(),taskId:task.task_id,
            mode:"t2v",model:task.model,modelLabel:task.modelLabel||"Seedance",
            ar:task.ratio||"16:9",ratio:task.ratio||"16:9",
            resolution:task.resolution||"720p",duration:task.duration||5,
            prompt:task.prompt||"",videoUrl:task.video_url,
          };
          setNodes(ns=>[...ns,newNode]);
          setSelId(id);setPanel({type:"detail",nodeId:id});
        }}
      />}
      {preview&&<PreviewModal node={preview} onClose={()=>setPreview(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
